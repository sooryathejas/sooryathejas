name: Update README

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dateutil python-dotenv lxml

      - name: Run update script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: sooryathejas
        run: python today.py

      - name: Commit and push changes
        run: |
          git config --global user.name "sooryathejas"
          git config --global user.email "sooryathejas@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache/
          git diff --staged --quiet || git commit -m "Updated README"
          git push
